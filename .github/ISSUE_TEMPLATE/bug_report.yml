name: Bug Report
description: Report a bug in FediSpace
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g., Pixel 9 Pro Fold"
    validations:
      required: true
  - type: input
    id: android-version
    attributes:
      label: Android Version
      placeholder: "e.g., 16"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App Version
      placeholder: "e.g., 0.1.5"
    validations:
      required: true
  - type: input
    id: instance
    attributes:
      label: Pixelfed Instance
      placeholder: "e.g., pixelfed.social"
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, drag and drop screenshots here
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell
